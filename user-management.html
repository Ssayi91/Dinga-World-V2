<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link rel="stylesheet" href="user-management.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <h2>Admin Dashboard</h2>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="manage-cars.html">Manage Cars</a></li>
                <li><a href="user-management.html" class="active">User Management</a></li>
                <li><a href="blog-management.html">Blog Management</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <div class="main-content">
            <header>
                <h1>User Management</h1>
            </header>

            <!-- Add New User Section -->
            <section class="add-user-section">
                <h2>Add New User</h2>
                <form class="add-user-form">
                    <input type="text" placeholder="Username" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    
                    <h3>Assign Rights</h3>
                    <label>
                        <input type="checkbox" name="rights" value="upload_cars"> Upload Cars
                    </label>
                    <label>
                        <input type="checkbox" name="rights" value="upload_details"> Upload Details
                    </label>
                    <label>
                        <input type="checkbox" name="rights" value="manage_blog"> Manage Blog Platform
                    </label>
                    
                    <button type="submit">Add User</button>
                </form>
            </section>

            <!-- Existing Users List -->
            <section class="users-list-section">
                <h2>Existing Users</h2>
                <ul class="users-list">
                    <li>
                        <span>John Doe</span> 
                        <span>Rights: Upload Cars, Manage Blog</span>
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </li>
                    <li>
                        <span>Jane Smith</span> 
                        <span>Rights: Upload Details</span>
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </li>
                    <!-- More users here -->
                </ul>
            </section>
        </div>
    </div>
</body>
</html>
