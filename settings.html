<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <h2>Dinga World Dashboard</h2>
            <ul>
                <li><a href="admin.html">Dashboard</a></li>
                <li><a href="manage-cars.html">Manage Cars</a></li>
                <li><a href="user-management.html">User Management</a></li>
                <li><a href="blog-management.html">Blog Management</a></li>
                <li><a href="settings.html" class="active">Settings</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <div class="main-content">
            <header>
                <h1>Settings</h1>
            </header>

            <!-- Settings Section -->
            <section class="settings-section">
                <div class="settings-category">
                    <h2>Site Settings</h2>
                    <form>
                        <label for="siteName">Site Name:</label>
                        <input type="text" id="siteName" placeholder="Enter site name">

                        <label for="siteDescription">Site Description:</label>
                        <textarea id="siteDescription" placeholder="Enter site description"></textarea>

                        <label for="siteLogo">Upload Logo:</label>
                        <input type="file" id="siteLogo">

                        <label for="siteFavicon">Upload Favicon:</label>
                        <input type="file" id="siteFavicon">

                        <button type="submit">Save Changes</button>
                    </form>
                </div>

                <div class="settings-category">
                    <h2>User Account Settings</h2>
                    <form>
                        <label for="adminEmail">Admin Email:</label>
                        <input type="email" id="adminEmail" placeholder="Enter admin email">

                        <label for="password">Change Password:</label>
                        <input type="password" id="password" placeholder="Enter new password">

                        <label for="2fa">Enable Two-Factor Authentication:</label>
                        <input type="checkbox" id="2fa">

                        <button type="submit">Save Changes</button>
                    </form>
                </div>

                <div class="settings-category">
                    <h2>Security Settings</h2>
                    <form>
                        <label for="passwordPolicy">Password Policy:</label>
                        <select id="passwordPolicy">
                            <option value="strong">Strong</option>
                            <option value="medium">Medium</option>
                            <option value="weak">Weak</option>
                        </select>

                        <label for="ipWhitelist">IP Whitelisting:</label>
                        <textarea id="ipWhitelist" placeholder="Enter allowed IP addresses"></textarea>

                        <button type="submit">Save Changes</button>
                    </form>
                </div>

                <div class="settings-category">
                    <h2>Backup & Restore</h2>
                    <form>
                        <label for="backupFrequency">Backup Frequency:</label>
                        <select id="backupFrequency">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>

                        <label for="restoreBackup">Restore Backup:</label>
                        <input type="file" id="restoreBackup">

                        <button type="submit">Save Changes</button>
                    </form>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
